name: Build and deploy PHP app to Azure Web App - ticket-manager-nti

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Install Composer dependencies
        if: steps.check_files.outputs.files_exists == 'true'
        run: |
          composer validate --no-check-publish
          composer install --prefer-dist --no-progress --no-dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: php-app

      # 🔥 FIX: Mover CI4 public/ al root
      - name: Move CodeIgniter public folder to root
        run: |
          echo "Removing Azure default index and moving CI4 public files..."
          rm -f index.php
          rm -f hostingstart.html
          cp -r public/* .
          echo "Move completed."

      # 🧹 Limpiar archivos innecesarios
      - name: Cleanup leftover public folder
        run: |
          rm -rf public

      # 🚀 Deploy final
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ticket-manager-nti'
          package: ./public
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_42FEA7680ADD41EDA8B24DCE717165D6 }}
